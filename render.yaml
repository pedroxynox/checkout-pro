# Blueprint de implantação no Render (https://render.com).
#
# Cria automaticamente:
#   1. Um banco de dados PostgreSQL gerenciado (plano pago basic-256mb).
#   2. Um serviço web Node com o backend NestJS (plano pago starter).
#   3. Um site estático com a versão web do app (Expo Web) — gratuito.
#
# O serviço web, no build, instala dependências, gera o Prisma Client e compila.
# No start, aplica as migrações e sobe a API. O SEED NÃO roda automaticamente
# (evita "ressuscitar" pessoas excluídas em "Acesso"). Para um banco novo/vazio,
# rode o seed UMA vez manualmente: `npx prisma db seed` no diretório backend.
#
# Planos pagos (desde jul/2026):
#   - O serviço web usa o plano `starter`, que NÃO hiberna — sem cold start.
#     Por isso o antigo workflow de keep-alive (ping periódico) foi removido.
#   - O banco usa o plano `basic-256mb` (persistente; sem a expiração de ~30
#     dias do plano free). Como o limite de conexões desse plano é modesto, o
#     backend fixa um teto de pool via DATABASE_CONNECTION_LIMIT para não
#     esgotá-lo. Suba esse teto junto se migrar para um plano maior.

databases:
  - name: stok-center-db
    plan: basic-256mb
    databaseName: stok_center
    user: stok_center

services:
  - type: web
    name: checkout-pro-api
    runtime: node
    plan: starter
    rootDir: backend
    # --include=dev força a instalação das devDependencies (NestJS CLI, Prisma,
    # ts-node) mesmo com NODE_ENV=production, necessárias para build e seed.
    buildCommand: npm install --include=dev && npx prisma generate && npm run build
    # As migrações rodam ANTES de subir o serviço — evita timeout de porta no
    # Render por causa do advisory lock do Prisma segurar a partida enquanto o
    # Render aguarda a porta abrir. O seed NÃO roda aqui de propósito: assim uma
    # pessoa excluída em "Acesso" não volta a cada deploy. Rode o seed manualmente
    # apenas em um banco novo/vazio.
    preDeployCommand: npx prisma migrate deploy
    startCommand: node dist/main.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stok-center-db
          property: connectionString
      # Teto do pool de conexões do Prisma, aplicado à DATABASE_URL pelo
      # PrismaService. O Postgres basic-256mb tem um limite de conexões baixo;
      # com UMA instância web, 10 deixa folga para migrações/seed/manutenção.
      # Aumente junto se subir o plano ou o número de instâncias (sempre
      # respeitando o limite máximo do banco).
      - key: DATABASE_CONNECTION_LIMIT
        value: "10"
      # Segredo de assinatura dos tokens JWT: gerado automaticamente pelo Render.
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 30d
      - key: HORARIO_FIM_DO_DIA
        value: "22:50"
      # Senha inicial dos usuários do seed. Secreta — defina no painel do serviço
      # (não versionar). Troque após o primeiro login.
      - key: SENHA_INICIAL
        sync: false
      # Assistente de IA (Cluby): a chave é secreta — defina no painel do serviço.
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash


  # Site estático: versão WEB do app (Expo Web / React Native Web).
  # Útil para visualizar mudanças de layout rapidamente em qualquer navegador,
  # sem reinstalar o APK. Sites estáticos no Render são gratuitos e NÃO dormem.
  # Atualiza automaticamente a cada push na branch conectada.
  - type: web
    runtime: static
    name: checkout-pro-web
    rootDir: mobile
    buildCommand: npm install --include=dev && npx expo export --platform web --output-dir dist
    staticPublishPath: ./dist
    # Reescreve todas as rotas para index.html (navegação SPA do React Navigation).
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # URL pública da API (mesmo backend do app móvel).
      - key: EXPO_PUBLIC_API_URL
        value: https://checkout-pro-api.onrender.com
