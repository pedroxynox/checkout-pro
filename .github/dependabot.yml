# Monitoramento automático de dependências (Dependabot).
#
# O objetivo é ser avisado cedo — e receber PRs prontos e testados pela CI —
# quando surgir uma dependência vulnerável ou desatualizada, em vez de descobrir
# tarde. As atualizações vêm AGRUPADAS e SEMANAIS para não virar ruído: você
# revisa, a CI roda os testes, e só então você faz o merge. Nada é aplicado
# sozinho no app em produção.
version: 2
updates:
  # Pacotes npm do monorepo (backend NestJS + app Expo, workspaces na raiz).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      # Correções de patch/minor juntas: baixo risco, fáceis de revisar.
      patch-e-minor:
        update-types:
          - minor
          - patch
    # Ignora as atualizações de versão MAIOR dos frameworks pesados (NestJS,
    # Expo, React Native, React Navigation). Esses saltos quebram o app com
    # facilidade e exigem uma migração dedicada e testada — serão feitos à mão,
    # um de cada vez, e não propostos automaticamente (evita ruído e risco).
    # As atualizações de patch/minor desses pacotes continuam sendo propostas.
    ignore:
      - dependency-name: '@nestjs/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo'
        update-types: ['version-update:semver-major']
      - dependency-name: 'expo-*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@expo/*'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-dom'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native'
        update-types: ['version-update:semver-major']
      - dependency-name: 'react-native-*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@react-navigation/*'
        update-types: ['version-update:semver-major']
    labels:
      - dependencias

  # Mantém as GitHub Actions da CI atualizadas (segurança da cadeia de build).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencias
