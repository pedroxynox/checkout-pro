# Monitoramento automático de dependências (Dependabot).
#
# O objetivo é ser avisado cedo — e receber PRs prontos e testados pela CI —
# quando surgir uma dependência vulnerável ou desatualizada, em vez de descobrir
# tarde. As atualizações vêm AGRUPADAS e SEMANAIS para não virar ruído: você
# revisa, a CI roda os testes, e só então você faz o merge. Nada é aplicado
# sozinho no app em produção.
version: 2
updates:
  # Pacotes npm do monorepo (backend NestJS + app Expo, workspaces na raiz).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      # Correções de patch/minor juntas: baixo risco, fáceis de revisar.
      patch-e-minor:
        update-types:
          - minor
          - patch
    ignore:
      # Pacotes GERENCIADOS PELO EXPO SDK: react-native, react e afins são
      # travados na versão que o SDK exige e só devem mudar via `expo install`
      # ao subir o SDK. Bumpá-los sozinho quebra o app (ex.: RN 0.76→0.86 numa
      # base Expo 52). Como usam versão 0.x, o salto conta como "minor" e passa
      # despercebido — por isso são IGNORADOS por completo aqui.
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: '@expo-google-fonts/*'
      - dependency-name: 'jest-expo'
      # Frameworks cujo salto MAIOR exige migração dedicada e testada (o app
      # continua recebendo patch/minor seguros desses pacotes).
      - dependency-name: '@nestjs/*'
        update-types: ['version-update:semver-major']
      - dependency-name: '@react-navigation/*'
        update-types: ['version-update:semver-major']
    labels:
      - dependencias

  # Mantém as GitHub Actions da CI atualizadas (segurança da cadeia de build).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencias
