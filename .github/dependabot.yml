# Monitoramento automático de dependências (Dependabot).
#
# O objetivo é ser avisado cedo — e receber PRs prontos e testados pela CI —
# quando surgir uma dependência vulnerável ou desatualizada, em vez de descobrir
# tarde. As atualizações vêm AGRUPADAS e SEMANAIS para não virar ruído: você
# revisa, a CI roda os testes, e só então você faz o merge. Nada é aplicado
# sozinho no app em produção.
version: 2
updates:
  # Pacotes npm do monorepo (backend NestJS + app Expo, workspaces na raiz).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    commit-message:
      prefix: chore(deps)
    groups:
      # Correções de patch/minor juntas: baixo risco, fáceis de revisar.
      patch-e-minor:
        update-types:
          - minor
          - patch
    ignore:
      # 1) Nunca propor saltos de versão MAIOR de NADA: eles sempre exigem
      #    migração manual e testada (ex.: ESLint 8→10, Jest 29→30, NestJS
      #    10→11). O app segue recebendo patch/minor seguros, agrupados.
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # 2) Pacotes TRAVADOS pelo Expo SDK / React: ou usam versão 0.x (o salto
      #    vira "minor" e escaparia da regra acima), ou precisam casar exatamente
      #    com o SDK/React. Só mudam via `expo install` ao subir o SDK — por isso
      #    são IGNORADOS por completo (ex.: react-native 0.76→0.86 quebra o app).
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      - dependency-name: 'react'
      - dependency-name: 'react-dom'
      - dependency-name: 'react-test-renderer'
      - dependency-name: '@types/react'
      - dependency-name: '@types/react-test-renderer'
      - dependency-name: 'expo'
      - dependency-name: 'expo-*'
      - dependency-name: '@expo/*'
      - dependency-name: '@expo-google-fonts/*'
      - dependency-name: 'eslint-config-expo'
      - dependency-name: 'jest-expo'
    labels:
      - dependencias

  # Mantém as GitHub Actions da CI atualizadas (segurança da cadeia de build).
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
    labels:
      - dependencias
