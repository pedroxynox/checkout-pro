# Mantém a API do Render "acordada" durante o horário de operação da loja.
#
# O plano gratuito do Render hiberna o serviço após ~15 min sem requisições.
# Este workflow faz um "ping" no endpoint público /health a cada 10 minutos,
# evitando que o servidor durma enquanto a loja está aberta.
#
# Janela (horário de Brasília, UTC-3): ~05:00 às 23:59 local.
#   - 08:00–23:59 UTC  -> 05:00–20:59 local
#   - 00:00–02:59 UTC  -> 21:00–23:59 local
# De madrugada (00:00–05:00 local) ele pode dormir — ninguém está trabalhando,
# e assim economizamos as horas gratuitas do Render.
#
# Também pode ser disparado manualmente em "Actions" (workflow_dispatch).

name: Keep API awake (Render)

on:
  schedule:
    - cron: '*/10 8-23 * * *'
    - cron: '*/10 0-2 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: |
          echo "Pingando a API (tolera cold start de até ~120s)..."
          code=$(curl -sS -m 120 --retry 2 --retry-delay 30 \
            -o /dev/null -w "%{http_code}" \
            https://checkout-pro-api.onrender.com/health)
          echo "Resposta HTTP: $code"
          if [ "$code" != "200" ]; then
            echo "A API não respondeu 200 (pode estar acordando). Status: $code"
            exit 1
          fi
          echo "API acordada e saudável."
